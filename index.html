<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <article data-testid="test-todo-card">
    <div>
      <label>
        <input
          type="checkbox"
          data-testid="test-todo-complete-toggle"
          id="todo-checkbox"
        />
        Mark as complete
      </label>
    </div>

    <h2 data-testid="test-todo-title" id="title">
      Finish Internship Task
    </h2>

    <p data-testid="test-todo-description">
      Build a fully testable and accessible todo card component.
    </p>

    <div class="row">
      <span
        class="badge"
        data-testid="test-todo-priority"
        aria-label="Priority High"
      >
        High
      </span>

      <span
        class="badge"
        data-testid="test-todo-status"
        id="status"
      >
        Pending
      </span>
    </div>

    <div class="row">
      <time
        data-testid="test-todo-due-date"
        datetime="2026-03-01T18:00:00Z"
        id="due-date"
      >
        Due Mar 1, 2026
      </time>

      <time
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
      >
        
      </time>
    </div>

    <div
      class="tags"
      data-testid="test-todo-tags"
      role="list"
    >
      <span class="tag" role="listitem" data-testid="test-todo-tag-work">work</span>
      <span class="tag" role="listitem" data-testid="test-todo-tag-urgent">urgent</span>
      <span class="tag" role="listitem">design</span>
    </div>

    <div class="actions">
      <button
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
        onclick="console.log('edit clicked')"
      >
        Edit
      </button>

      <button
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
        onclick="alert('Delete clicked')"
      >
        Delete
      </button>
    </div>
  </article>

  <script>
    const checkbox = document.getElementById("todo-checkbox");
    const title = document.getElementById("title");
    const status = document.getElementById("status");
    const card = document.querySelector('[data-testid="test-todo-card"]');

    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        card.classList.add("completed");
        status.textContent = "Done";
      } else {
        card.classList.remove("completed");
        status.textContent = "Pending";
      }
    });

    const dueDate = new Date("2026-03-01T18:00:00Z");
    const timeEl = document.getElementById("time-remaining");

    function updateTime() {
      const now = new Date();
      const diff = dueDate - now;

      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      let text = "";

      if (diff <= 0) {
        const overdueHours = Math.abs(hours);
        text = `Overdue by ${overdueHours} hour${overdueHours !== 1 ? 's' : ''}`;
      } else if (minutes < 60) {
        text = "Due now!";
      } else if (hours < 24) {
        text = `Due in ${hours} hour${hours !== 1 ? 's' : ''}`;
      } else if (days === 1) {
        text = "Due tomorrow";
      } else {
        text = `Due in ${days} days`;
      }

      timeEl.textContent = text;
    }

    updateTime();
    setInterval(updateTime, 60000);
  </script>
</body>
</html>
